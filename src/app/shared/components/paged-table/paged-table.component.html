<div class="overflow-x-auto">
  <table class="w-full">
    <thead>
      <tr class="bg-stone-50 dark:bg-stone-700"></tr>
      @for (header of columnHeaders; track $index) {
        <th class="px-6 py-3 text-left cursor-pointer">
          <div
            class="flex items-center text-xs font-medium text-stone-500 dark:text-stone-300 uppercase tracking-wider"
          >
            {{ header.name }}
            @if (header.sortable) {
              <lucide-angular name="arrow-up-down" class="h-4 w-4 ml-1"></lucide-angular>
            }
          </div>
        </th>
      }
    </thead>
    <tbody class="divide-stone-200 dark:divide-stone-700">
      <ng-content></ng-content>
    </tbody>
  </table>
</div>

<div class="px-6 py-4 flex items-center justify-between border-t border-stone-200 dark:border-stone-700">
  <div>
    <nav class="relative z-0 inline-flex rounded-md shadow-sm -space-x-px">
      <button
        class="relative inline-flex items-center px-2 py-2 rounded-l-md border border-stone-300 bg-white text-sm font-medium text-stone-500 hover:bg-stone-50 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <span class="sr-only">Previous</span>
        <lucide-angular name="arrow-left" class="h-5 w-5" />
      </button>
      @for (pageNum of pages; track $index) {
        <button
          class="relative inline-flex items-center px-4 py-2 border text-sm font-medium {{
            currentPage === pageNum
              ? 'z-10 bg-amber-50 border-amber-600 text-amber-700'
              : 'bg-white border-stone-300 text-stone-500 hover:bg-stone-50'
          }}"
        >
          {{ pageNum }}
        </button>
      }
      <button
        class="relative inline-flex items-center px-2 py-2 rounded-r-md border border-stone-300 bg-white text-sm font-medium text-stone-500 hover:bg-stone-50 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <span class="sr-only">Next</span>
        <lucide-angular name="arrow-right" class="h-5 w-5" />
      </button>
    </nav>
  </div>
</div>
